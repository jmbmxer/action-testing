name: eBPF Security Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ebpf-security-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Compose
      run: |
        sudo apt-get update
        sudo apt-get install -y docker-compose jq

    - name: Build customer image
      run: |
        docker build -t customer-image:latest .
        docker images

    - name: Generate Docker run command using Claude
      id: generate-command
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        DOCKERFILE_CONTENT=$(cat Dockerfile)
        PROMPT="Given the following Dockerfile, generate a Docker run command that will effectively exercise the container for security testing. The command should include appropriate flags and arguments to test the main functionality of the container. Dockerfile:

        $DOCKERFILE_CONTENT

        Generate only the Docker run command, without any explanation:"

        API_RESPONSE=$(curl -s -X POST https://api.anthropic.com/v1/completions \
          -H "Content-Type: application/json" \
          -H "X-API-Key: $ANTHROPIC_API_KEY" \
          -d '{
            "model": "claude-2.0",
            "prompt": "Human: '"$PROMPT"'\n\nAssistant:",
            "max_tokens_to_sample": 300,
            "temperature": 0.2
          }')

        DOCKER_RUN_COMMAND=$(echo $API_RESPONSE | jq -r '.completion' | tr -d '\n')
        echo "Generated Docker run command: $DOCKER_RUN_COMMAND"
        echo "DOCKER_RUN_COMMAND=$DOCKER_RUN_COMMAND" >> $GITHUB_OUTPUT

    - name: Run Docker Compose
      env:
        EXPORTER_LOG_LEVEL: DEBUG
        EXPORTER_PROVIDER_STDOUT_ENABLED: '1'
        EXPORTER_PROVIDER_KSOC_API_ENABLED: '1'
        EXPORTER_PROVIDER_KSOC_API_URL: ${{ secrets.EXPORTER_PROVIDER_KSOC_API_URL }}
        EXPORTER_PROVIDER_KSOC_API_ACCESS_KEY_ID: ${{ secrets.EXPORTER_PROVIDER_KSOC_API_ACCESS_KEY_ID }}
        EXPORTER_PROVIDER_KSOC_API_SECRET_KEY: ${{ secrets.EXPORTER_PROVIDER_KSOC_API_SECRET_KEY }}
      run: |
        sudo -E docker-compose up -d
        sudo docker-compose ps

    - name: Wait for containers to start
      run: sleep 60

    - name: Check container status
      run: sudo docker ps -a

    - name: Exercise customer container
      run: |
        if [ -z "${{ steps.generate-command.outputs.DOCKER_RUN_COMMAND }}" ]; then
          echo "Error: No Docker run command generated"
          exit 1
        fi
        echo "Executing: ${{ steps.generate-command.outputs.DOCKER_RUN_COMMAND }}"
        ${{ steps.generate-command.outputs.DOCKER_RUN_COMMAND }}
        
        # Wait for the container to start
        sleep 10
        
        # Test the endpoints
        curl http://localhost:8080 || echo "Failed to reach /"
        curl http://localhost:8080/test || echo "Failed to reach /test"

    - name: Collect eBPF agent logs
      run: sudo docker-compose logs agent

    - name: Collect exporter logs
      run: sudo docker-compose logs exporter

    - name: Analyze eBPF data
      run: |
        # Add commands here to analyze the eBPF data collected by the agent
        # This might involve parsing the agent logs or accessing a specific output file

    - name: Check for security issues
      run: |
        # Add commands to check for security issues based on the eBPF data
        # This could involve running a separate analysis tool or script

    - name: Clean up
      run: sudo docker-compose down